<script src="{{ "/js/jquery-1.11.1.min.js" | absURL }}"></script>
<script src="{{ "/js/bootstrap.min.js" | absURL }}"></script>
<script src="{{ "/js/TweenMax.min.js" | absURL }}"></script>
<script src="{{ "/js/lozad.js" | absURL }}"></script>
<script src="{{ "/js/resizeable.js" | absURL }}"></script>
<script src="{{ "/js/joinable.js" | absURL }}"></script>
<script src="{{ "/js/xenon-api.js" | absURL }}"></script>
<script src="{{ "/js/xenon-toggles.js" | absURL }}"></script>
<script src="{{ "/js/xenon-custom.js" | absURL }}"></script>
<script src="{{ "/js/search.js" | absURL }}"></script>
<script src="{{ "/js/theme-toggle.js" | absURL }}"></script>
<script>
    $(document).ready(function() {
        // 图片懒加载
        const observer = lozad();
        observer.observe();

        // 子菜单展开/收起
        $(document).on('click', '.has-sub', function(){
            var _this = $(this);
            if(!$(this).hasClass('expanded')) {
               setTimeout(function(){
                    _this.find('ul').attr("style","");
               }, 300);
            } else {
                $('.has-sub ul').each(function(id,ele){
                    var _that = $(this);
                    if(_this.find('ul')[0] != ele) {
                        setTimeout(function(){
                            _that.attr("style","");
                        }, 300);
                    }
                });
            }
        });

        $('.user-info-menu .hidden-sm').click(function(){
            if($('.sidebar-menu').hasClass('collapsed')) {
                $('.has-sub.expanded > ul').attr("style","");
            } else {
                $('.has-sub.expanded > ul').show();
            }
        });

        $("#main-menu li ul li").click(function() {
            $(this).siblings('li').removeClass('active');
            $(this).addClass('active');
        });

        // 锚点平滑滚动
        $("a.smooth").click(function(ev) {
            ev.preventDefault();
            public_vars.$mainMenu.add(public_vars.$sidebarProfile).toggleClass('mobile-is-visible');
            ps_destroy();
            $("html, body").animate({
                scrollTop: $($(this).attr("href")).offset().top - 30
            }, {
                duration: 500,
                easing: "swing"
            });
        });

        // 回到顶部
        $('[rel="go-top"]').click(function(ev) {
            ev.preventDefault();
            $("html, body").animate({
                scrollTop: 0
            }, 800);
        });
    });
</script>
