<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="author" content="{{ .Site.Params.author }}" />
<title>{{ with T "title" }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}</title>
<meta name="keywords" content="UI设计,UI设计素材,设计导航,网址导航,设计资源,创意导航,创意网站导航,设计师网址大全,设计素材大全,设计师导航,UI设计资源,优秀UI设计欣赏,产品经理网址导航,交互设计师网址导航">
<meta name="description" content="{{ with T "description" }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<!-- Favicon -->
<link rel="shortcut icon" href="{{ "/images/favicon.png" | relURL }}">

<!-- Fonts -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Arimo:400,700,400italic">

<!-- CSS -->
<link rel="stylesheet" href="{{ "/css/fonts/linecons/css/linecons.css" | relURL }}">
<link rel="stylesheet" href="{{ "/css/fonts/fontawesome/css/font-awesome.min.css" | relURL }}">
<link rel="stylesheet" href="{{ "/css/bootstrap.css" | relURL }}">
<link rel="stylesheet" href="{{ "/css/xenon-core.css" | relURL }}">
<link rel="stylesheet" href="{{ "/css/xenon-components.css" | relURL }}">
<link rel="stylesheet" href="{{ "/css/xenon-skins.css" | relURL }}">
<link rel="stylesheet" href="{{ "/css/nav.css" | relURL }}">
<link rel="stylesheet" href="{{ "/css/custom.css" | relURL }}">

<!-- HTML5 shim and Respond.js IE8 support -->
<!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
<![endif]-->

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:title" content="{{ with T "title" }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}">
<meta property="og:description" content="{{ with T "description" }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:site_name" content="{{ with T "title" }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}">

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ with T "title" }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}">
<meta name="twitter:description" content="{{ with T "description" }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
