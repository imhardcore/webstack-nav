<a class="site-card"
   href="{{ .url }}"
   target="_blank"
   rel="noopener">
    <div class="card-header">
        {{ $logoSrc := "" }}
        {{ if .logo }}
            {{ $logoSrc = .logo }}
        {{ else }}
            {{ $logoSrc = "/webstack-nav/images/logos/default.png" }}
        {{ end }}
        <img src="{{ $logoSrc }}"
             class="card-icon"
             width="32"
             height="32"
             loading="lazy"
             alt="{{ .title }}"
             onerror="this.src='/webstack-nav/images/logos/default.png'">
        <span class="card-title">{{ .title }}</span>
    </div>
    <p class="card-desc">{{ if .description }}{{ .description }}{{ else }}{{ .title }}{{ end }}</p>
</a>
