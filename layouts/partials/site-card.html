<a class="site-card"
   href="{{ .url }}"
   target="_blank"
   rel="noopener">
    <div class="card-header">
        <img data-src="{{ $.Site.BaseURL }}images/logos/{{ .logo }}"
             src="{{ $.Site.BaseURL }}images/logos/default.png"
             class="lozad card-icon"
             width="32"
             height="32"
             loading="lazy"
             alt="{{ .title }}">
        <span class="card-title">{{ .title }}</span>
    </div>
    <p class="card-desc">{{ .description }}</p>
</a>
