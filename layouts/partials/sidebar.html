<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-brand" aria-label="My Navigation">
            <span class="logo-mark" aria-hidden="true">
                <span class="logo-mark-accent">M</span><span class="logo-mark-rest">N</span>
            </span>
            <span class="logo-text">
                <span class="logo-text-accent">My</span>&nbsp;Navigation
            </span>
        </div>
    </div>
    <div class="sidebar-divider"></div>
    <nav class="sidebar-nav" aria-label="分类导航">
        <ul class="nav-list">
            {{ range $group := .Site.Data.categories.groups }}
                {{ range $cat := $group.categories }}
                <li>
                    <a href="#{{ $cat.id }}" class="nav-item smooth" data-label="{{ $cat.name }}">
                        <i class="{{ if $cat.icon }}{{ $cat.icon }}{{ else }}{{ $group.icon }}{{ end }}" aria-hidden="true"></i>
                        <span class="nav-text">{{ $cat.name }}</span>
                    </a>
                </li>
                {{ end }}
            {{ end }}
        </ul>
    </nav>
    <button class="sidebar-collapse-btn" id="sidebar-collapse" aria-label="折叠/展开侧边栏" aria-expanded="false">
        <i class="fa fa-angle-left" aria-hidden="true"></i>
    </button>
</aside>
