<div class="toolbar-left">
    <div class="search-box">
        <i class="fa-search" aria-hidden="true"></i>
        <label for="site-search" class="sr-only">搜索网站</label>
        <input type="search" id="site-search" placeholder="搜索网站…" autocomplete="off">
    </div>
</div>
<div class="toolbar-right">
    <button class="icon-btn" id="theme-toggle" aria-label="切换深色/浅色模式">
        <i class="fa-moon-o" aria-hidden="true"></i>
    </button>
    <a class="icon-btn" href="{{ .Site.BaseURL }}admin/" aria-label="后台管理">
        <i class="fa-cog" aria-hidden="true"></i>
    </a>
    <a class="icon-btn" href="https://github.com/{{ .Site.Params.githubRepo }}" target="_blank" rel="noopener" aria-label="GitHub 仓库">
        <i class="fa-github" aria-hidden="true"></i>
    </a>
</div>
