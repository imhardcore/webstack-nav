<div class="google-search-container" role="search">

            <i class="fa fa-google google-search-icon" aria-hidden="true"></i>
            <label for="google-search-input" class="sr-only">使用 Google 搜索全网</label>
            <input
                type="text"
                id="google-search-input"
                name="q"
                placeholder="使用 Google 智能搜索全网..."
                autocomplete="off"
                aria-label="Google 搜索"
            >
            <a href="https://gemini.google.com/" target="_blank" rel="noopener" class="gemini-btn" aria-label="打开 Gemini">
                <svg class="gemini-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <defs>
                        <linearGradient id="gemini-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4285f4"/>
                            <stop offset="50%" stop-color="#9b72cb"/>
                            <stop offset="100%" stop-color="#d96570"/>
                        </linearGradient>
                    </defs>
                    <path fill="url(#gemini-grad)" d="M11.04 19.32Q12 21.51 12 24q0-2.49.93-4.68.96-2.19 2.58-3.81t3.81-2.55Q21.51 12 24 12q-2.49 0-4.68-.93a12.3 12.3 0 0 1-3.81-2.58 12.3 12.3 0 0 1-2.58-3.81Q12 2.49 12 0q0 2.49-.96 4.68-.93 2.19-2.55 3.81a12.3 12.3 0 0 1-3.81 2.58Q2.49 12 0 12q2.49 0 4.68.96 2.19.93 3.81 2.55t2.55 3.81"/>
                </svg>
                <span>Gemini</span>
            </a>
        </div>
    </form>
</div>
