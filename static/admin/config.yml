backend:
  name: github
  repo: imhardcore/webstack-nav
  branch: main
  auth_methods: [token]

media_folder: "static/images/logos"
public_folder: "/webstack-nav/images/logos"

site_url: "https://imhardcore.github.io/webstack-nav/"
display_url: "https://imhardcore.github.io/webstack-nav/"
logo_url: "/webstack-nav/images/logo@2x.png"

collections:
  # === 网址管理 ===
  - name: "sites"
    label: "网址管理"
    label_singular: "网址"
    delete: false
    files:
      - label: "网址列表"
        name: "sites"
        file: "data/sites.json"
        fields:
          - label: "网址数据"
            name: "sites"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "唯一标识符，英文小写，如 chatgpt" }
              - { label: "网站名称", name: "title", widget: "string" }
              - { label: "网址", name: "url", widget: "string" }
              - { label: "描述", name: "description", widget: "text" }
              - label: "图标"
                name: "logo"
                widget: "image"
                required: false
                hint: "上传网站图标到 static/images/logos/"
              - label: "分类"
                name: "category"
                widget: "select"
                options:
                  - "AI"
                  - "GFW"
                  - "SillyTavern"
                  - "设计资源"
                  - "影视资源"
              - label: "分类组"
                name: "group"
                widget: "select"
                options:
                  - "nav"

  # === 分类管理 ===
  - name: "categories"
    label: "分类管理"
    label_singular: "分类"
    delete: false
    files:
      - label: "分类结构"
        name: "categories"
        file: "data/categories.json"
        fields:
          - label: "分类组"
            name: "groups"
            widget: "list"
            fields:
              - { label: "组ID", name: "id", widget: "hidden", default: "nav" }
              - label: "图标"
                name: "icon"
                widget: "select"
                options:
                  - { label: "导航", value: "fa fa-compass" }
                  - { label: "首页", value: "fa fa-home" }
                  - { label: "工具", value: "fa fa-wrench" }
                  - { label: "收藏", value: "fa fa-star" }
                  - { label: "全局", value: "fa fa-globe" }
                  - { label: "文件夹", value: "fa fa-folder" }
                  - { label: "列表", value: "fa fa-list" }
                  - { label: "网格", value: "fa fa-th" }
                  - { label: "标签", value: "fa fa-tags" }
                  - { label: "书签", value: "fa fa-bookmark" }
              - { label: "名称", name: "name", widget: "string" }
              - label: "子分类"
                name: "categories"
                widget: "list"
                required: false
                fields:
                  - { label: "分类ID", name: "id", widget: "string", hint: "与网址管理中的分类一致" }
                  - label: "图标"
                    name: "icon"
                    widget: "select"
                    required: false
                    options:
                      - { label: "AI", value: "fa fa-magic" }
                      - { label: "机器人", value: "fa fa-robot" }
                      - { label: "聊天", value: "fa fa-comments" }
                      - { label: "设计", value: "fa fa-paint-brush" }
                      - { label: "影视", value: "fa fa-film" }
                      - { label: "代码", value: "fa fa-code" }
                      - { label: "书籍", value: "fa fa-book" }
                      - { label: "音乐", value: "fa fa-music" }
                      - { label: "游戏", value: "fa fa-gamepad" }
                      - { label: "购物", value: "fa fa-shopping-cart" }
                      - { label: "图片", value: "fa fa-image" }
                      - { label: "视频", value: "fa fa-video-camera" }
                      - { label: "新闻", value: "fa fa-newspaper" }
                      - { label: "地图", value: "fa fa-map" }
                      - { label: "心形", value: "fa fa-heart" }
                      - { label: "灯泡", value: "fa fa-lightbulb-o" }
                      - { label: "火箭", value: "fa fa-rocket" }
                      - { label: "咖啡", value: "fa fa-coffee" }
                      - { label: "学校", value: "fa fa-graduation-cap" }
                      - { label: "医疗", value: "fa fa-medkit" }
                      - { label: "金融", value: "fa fa-money" }
                      - { label: "云", value: "fa fa-cloud" }
                      - { label: "下载", value: "fa fa-download" }
                      - { label: "搜索", value: "fa fa-search" }
                  - { label: "名称", name: "name", widget: "string" }

  # === 快捷链接 ===
  - name: "quick_links"
    label: "快捷链接"
    label_singular: "快捷链接"
    delete: false
    files:
      - label: "工具栏快捷链接"
        name: "quick_links"
        file: "data/quick_links.json"
        fields:
          - label: "链接列表"
            name: "quickLinks"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "唯一标识符" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "网址", name: "url", widget: "string" }
              - { label: "图标", name: "icon", widget: "string", hint: "FontAwesome 类名，如 fa fa-github" }

  # === Logo 配置 ===
  - name: "logo"
    label: "Logo 配置"
    delete: false
    files:
      - label: "Logo 设置"
        name: "logo"
        file: "data/logo.json"
        fields:
          - label: "Logo 配置"
            name: "logo"
            widget: "object"
            fields:
              - { label: "类型", name: "type", widget: "select", options: ["text", "image"], hint: "text=文字标识，image=图片标识" }
              - { label: "文字", name: "text", widget: "string", required: false, hint: "完整文字，如 我的导航" }
              - { label: "强调文字", name: "accentText", widget: "string", required: false, hint: "标识中高亮的部分，如 我的" }
              - { label: "图片路径", name: "image", widget: "string", required: false, hint: "标识图片路径" }
              - { label: "图片替代文字", name: "imageAlt", widget: "string", required: false }
              - { label: "图片宽度", name: "imageWidth", widget: "number", required: false, hint: "单位像素" }
              - { label: "图片高度", name: "imageHeight", widget: "number", required: false, hint: "单位像素" }
