backend:
  name: github
  repo: imhardcore/webstack-nav
  branch: main
  # 仅允许 Token 登录，避免默认 OAuth 跳转到 Netlify
  # PKCE 对 GitHub 尚未实现（计划 Q4 2025）
  auth_methods: [token]

media_folder: "static/images/logos"
public_folder: "/webstack-nav/images/logos"

site_url: "https://imhardcore.github.io/webstack-nav/"
display_url: "https://imhardcore.github.io/webstack-nav/"
logo_url: "/webstack-nav/images/logo@2x.png"

collections:
  - name: "sites"
    label: "网址管理"
    label_singular: "网址"
    delete: false
    files:
      - label: "网址列表"
        name: "sites"
        file: "data/sites.json"
        fields:
          - label: "网址数据"
            name: "sites"
            widget: "list"
            fields:
              - { label: "网站名称", name: "title", widget: "string" }
              - { label: "网址", name: "url", widget: "string" }
              - { label: "描述", name: "description", widget: "string" }
              - { label: "图标文件名", name: "logo", widget: "string", default: "default.png" }
              - label: "分类"
                name: "category"
                widget: "select"
                options:
                  - "常用推荐"
                  - "推荐"
                  - "社区资讯"
                  - "UED团队"
                  - "发现产品"
                  - "界面灵感"
                  - "网页灵感"
                  - "图标素材"
                  - "LOGO设计"
                  - "平面素材"
                  - "UI资源"
                  - "Sketch资源"
                  - "字体资源"
                  - "Mockup"
                  - "摄影图库"
                  - "PPT资源"
                  - "图形创意"
                  - "界面设计"
                  - "交互动效"
                  - "在线配色"
                  - "在线工具"
                  - "Chrome插件"
                  - "设计规范"
                  - "视频教程"
                  - "设计文章"
                  - "设计电台"
                  - "交互设计"
              - label: "分类组"
                name: "group"
                widget: "select"
                options:
                  - "top"
                  - "inspiration"
                  - "resources"
                  - "tools"
                  - "tutorial"

  - name: "categories"
    label: "分类管理"
    label_singular: "分类"
    delete: false
    files:
      - label: "分类结构"
        name: "categories"
        file: "data/categories.json"
        fields:
          - label: "分类组"
            name: "groups"
            widget: "list"
            fields:
              - { label: "组ID", name: "id", widget: "string" }
              - { label: "图标", name: "icon", widget: "string" }
              - { label: "名称", name: "name", widget: "string" }
              - label: "子分类"
                name: "categories"
                widget: "list"
                fields:
                  - { label: "分类ID", name: "id", widget: "string" }
                  - { label: "图标", name: "icon", widget: "string", required: false }
                  - { label: "名称", name: "name", widget: "string" }
